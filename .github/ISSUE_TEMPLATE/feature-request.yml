name: ✨ Feature Request
description: Suggest an idea or improvement for the app.
title: "[FEATURE]: "
labels: ["feature"]
body:
  - type: checkboxes
    id: checks
    attributes:
      label: Search for duplicates
      options:
        - label: I have searched existing issues to avoid duplicates.
          required: true

  - type: textarea
    id: problem
    attributes:
      label: Is your feature request related to a problem?
      description: A clear description of what the problem is (e.g. I'm always frustrated when...).
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Describe the proposed solution
      description: A clear and concise description of what you want to happen.
    validations:
      required: true

  - type: textarea
    id: use_case
    attributes:
      label: Use Case
      description: How would this feature improve your workflow or the app experience?

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add any other context, mockups, or screenshots about the feature request here.
